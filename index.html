<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kenya at 50</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #C8102E; --secondary: #006600; --gold: #E6A817;
    --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.06);
    --text: #ffffff; --font-scale: 1;
  }
  
  body { 
    font-family: 'Ubuntu', sans-serif; background: var(--bg); color: var(--text); 
    margin: 0; overflow: hidden; height: 100vh;
  }

  /* Screen Transitions */
  .screen { 
    position: absolute; inset: 0; display: none; padding: 20px; 
    animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .screen.active { display: flex; flex-direction: column; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .header { text-align: center; margin: 40px 0; }
  h1 { font-size: 3rem; margin: 0; color: var(--primary); text-shadow: 0 0 20px rgba(200, 16, 46, 0.3); }
  
  .card { 
    background: var(--card); border-radius: 24px; padding: 25px; 
    backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 15px; transition: 0.3s;
  }
  
  .btn { 
    padding: 18px; border-radius: 16px; border: none; font-weight: 700; 
    cursor: pointer; background: var(--primary); color: white; width: 100%;
    margin-top: 10px; font-size: 1rem;
  }
  .btn-secondary { background: transparent; border: 2px solid var(--primary); }
</style>
</head>
<body>

<div class="screen active" id="view-setup">
    <div class="header"><h1>KENYA AT 50</h1></div>
    <div class="card" id="team-list"></div>
    <button class="btn" onclick="addTeam()">+ Add Team</button>
    <button class="btn" onclick="startGame()">Start Tournament</button>
    <button class="btn btn-secondary" onclick="nav('view-settings')">Settings</button>
</div>

<div class="screen" id="view-settings">
    <h2>Settings</h2>
    <div class="card">
        <p>Font Size</p>
        <button class="btn" onclick="changeFont(-0.1)">Decrease</button>
        <button class="btn" onclick="changeFont(0.1)">Increase</button>
    </div>
    <button class="btn" onclick="goHome()">Back Home</button>
</div>

<div class="screen" id="view-play">
    <h2 id="play-team"></h2>
    <div class="card" style="text-align:center;">
        <div id="play-timer" style="font-size: 5rem; font-weight: bold;">50</div>
    </div>
    <button class="btn" onclick="endTurnEarly()">Finish Turn</button>
</div>

<script>
    let game = { teams: [{n:"Team 1", s:0}], curr: 0 };

    // Navigation and History Management
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        history.pushState({id: id}, null, '');
    }

    function goHome() { nav('view-setup'); }

    // Trap the Back Button
    window.addEventListener('popstate', (event) => {
        nav('view-setup'); // Always return to Home
        history.pushState({id: 'view-setup'}, null, '');
    });
    // Initialize history
    history.pushState({id: 'view-setup'}, null, '');

    function changeFont(delta) {
        let root = document.documentElement;
        let scale = parseFloat(getComputedStyle(root).getPropertyValue('--font-scale')) + delta;
        root.style.setProperty('--font-scale', Math.max(0.8, Math.min(scale, 1.5)));
    }

    function addTeam() { 
        game.teams.push({n:`Team ${game.teams.length+1}`, s:0}); 
        renderTeams(); 
    }

    function renderTeams() {
        document.getElementById('team-list').innerHTML = game.teams.map((t,i) => 
            `<input style="width:100%; background:transparent; color:white; border:none; border-bottom:1px solid #555; padding:10px; font-size:1.2rem;" value="${t.n}">`).join('');
    }

    function startGame() { nav('view-play'); }
    
    renderTeams();
</script>
</body>
</html>
