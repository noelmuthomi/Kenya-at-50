<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#121212">
<title>Kenya at 50</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --kenya-red: #C8102E;
    --kenya-green: #006600;
    --kenya-black: #121212;
    --kenya-gold: #E6A817;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #FDF6E3;
    --text-muted: #A0A0A0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
  input { user-select: text; }

  body {
    font-family: 'Ubuntu', sans-serif;
    background: radial-gradient(circle at top right, #2a0808 0%, var(--kenya-black) 60%);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Screens & Navigation */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto; padding-bottom: 30px;
  }
  .screen.active { opacity: 1; pointer-events: all; z-index: 10; }

  /* Premium Header */
  .header {
    text-align: center; padding: 40px 20px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  }
  .header-flag { display: flex; height: 4px; width: 60px; margin: 0 auto 15px; border-radius: 2px; overflow: hidden; }
  .header-flag div { flex: 1; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 3px; line-height: 1; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  .title span { color: var(--kenya-gold); }
  .subtitle { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; margin-top: 5px; }

  .container { padding: 0 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 15px; }

  /* Glassmorphism Buttons */
  .btn {
    padding: 16px 20px; border-radius: 16px; border: none;
    font-family: 'Ubuntu', sans-serif; font-weight: 700; font-size: 1.1rem;
    cursor: pointer; text-align: center; width: 100%;
    transition: transform 0.1s, box-shadow 0.2s;
    backdrop-filter: blur(10px);
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: linear-gradient(135deg, var(--kenya-red), #8B0000); color: white; box-shadow: 0 8px 25px rgba(200,16,46,0.3); }
  .btn-success { background: linear-gradient(135deg, var(--kenya-green), #004d00); color: white; box-shadow: 0 8px 25px rgba(0,102,0,0.3); }
  .btn-outline { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); }

  /* Inputs & Lists */
  .team-row { display: flex; gap: 10px; align-items: center; }
  .team-input {
    flex: 1; padding: 18px; border-radius: 16px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: white; font-family: 'Ubuntu', sans-serif; font-weight: 700; font-size: 1rem;
    outline: none; transition: border-color 0.3s;
  }
  .team-input:focus { border-color: var(--kenya-gold); background: rgba(255,255,255,0.1); }
  .btn-del { background: rgba(255,0,0,0.1); color: #ff4444; border: 1px solid rgba(255,0,0,0.2); border-radius: 16px; width: 55px; font-size: 1.2rem; cursor: pointer; }

  /* Score Cards */
  .score-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center;
    position: relative; overflow: hidden;
  }
  .score-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--kenya-gold); }
  .score-name { font-size: 1.2rem; font-weight: 700; }
  .score-pts { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--kenya-gold); line-height: 1; }

  /* Gameplay UI */
  .play-nav {
    background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(15px);
    padding: 20px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 20;
  }
  .timer-box { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--kenya-red); line-height: 1; text-shadow: 0 0 15px rgba(200,16,46,0.5); }
  
  .word-card { background: #fff; border-radius: 24px; overflow: hidden; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .word-row {
    display: flex; align-items: center; gap: 15px; padding: 20px;
    border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s;
  }
  .word-row:last-child { border-bottom: none; }
  .word-row.checked { background: #f8fff8; }
  .radio-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .word-row.checked .radio-btn { background: var(--kenya-green); border-color: var(--kenya-green); }
  .radio-btn svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 3; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
  .word-row.checked .radio-btn svg { opacity: 1; transform: scale(1); }
  
  .word-text { flex: 1; font-size: 1.2rem; font-weight: 700; color: #111; transition: color 0.2s; }
  .word-row.checked .word-text { color: #a0a0a0; text-decoration: line-through; }
  .word-pts { font-size: 0.9rem; font-weight: 700; color: var(--kenya-red); background: rgba(200,16,46,0.1); padding: 4px 12px; border-radius: 20px; }
  .word-row.checked .word-pts { color: var(--kenya-green); background: rgba(0,102,0,0.1); }

  /* Modals */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.3s; padding: 20px; text-align: center;
  }
  .modal.show { opacity: 1; pointer-events: all; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 4.5rem; color: var(--kenya-gold); margin-bottom: 10px; line-height: 1; }
  .modal-subtitle { font-size: 1.5rem; color: white; margin-bottom: 30px; font-weight: 500; }
  .modal-score { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; color: var(--kenya-red); line-height: 1; margin-bottom: 30px; }
</style>
</head>
<body>

<div class="screen active" id="view-setup">
  <div class="header">
    <div class="header-flag">
      <div style="background: #000;"></div><div style="background: #C8102E;"></div><div style="background: #006600;"></div>
    </div>
    <div class="title">KENYA AT <span>50</span></div>
    <div class="subtitle" id="db-status">Loading Database...</div>
  </div>
  <div class="container">
    <div id="team-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
    <button class="btn btn-outline" onclick="addTeam()">+ Add Team</button>
    <button class="btn btn-success" style="margin-top: 20px;" onclick="startGame()">Start Tournament</button>
  </div>
</div>

<div class="screen" id="view-scores">
  <div class="header" style="padding-top: 30px;">
    <div class="title" style="font-size: 3.5rem;">LEADERBOARD</div>
    <div class="subtitle" id="round-label">Round 1</div>
  </div>
  <div class="container">
    <div id="score-container" style="display: flex; flex-direction: column; gap: 12px;"></div>
    <button class="btn btn-primary" style="margin-top: 15px;" onclick="startTurn()">Start Next Turn</button>
  </div>
</div>

<div class="screen" id="view-play">
  <div class="play-nav">
    <div>
      <div style="color: var(--kenya-gold); font-weight: 700; font-size: 1.3rem;" id="play-team">Team Name</div>
      <div style="font-size: 0.9rem; color: var(--text-muted); margin-top: 4px;">Points Gained: <span id="live-pts" style="color: white; font-weight: 700;">0</span></div>
    </div>
    <div class="timer-box" id="play-timer">50</div>
  </div>
  <div class="container" style="padding-top: 15px;">
    <div class="word-card" id="word-list"></div>
    <button class="btn btn-outline" style="margin-top: 20px; border-color: var(--kenya-red); color: var(--kenya-red);" onclick="endTurnEarly()">⏹ Stop Timer</button>
  </div>
</div>

<div class="modal" id="modal-timeup">
  <div class="modal-title" style="color: var(--kenya-red);">TIME'S UP!</div>
  <div class="modal-subtitle">Turn Score</div>
  <div class="modal-score" id="turn-score">0</div>
  <button class="btn btn-primary" style="max-width: 300px;" onclick="closeTurn()">View Standings</button>
</div>

<div class="modal" id="modal-winner">
  <div class="modal-title">CHAMPIONS!</div>
  <div class="modal-subtitle" style="margin-bottom: 10px;">First to 500 Points</div>
  <div class="modal-score" id="win-team" style="font-size: 3.5rem; color: white;">Team Name</div>
  <button class="btn btn-success" style="max-width: 300px;" onclick="location.reload()">Play Again</button>
</div>

<script>
let WORLD_POOL = [];
let game = { teams: [{n:"Team Moja", s:0}, {n:"Team Mbili", s:0}], curr: 0, round: 1, words: [], timer: null, time: 50, active: false };

// Async DB Load with Generator Fallback
async function loadWords() {
  try {
    const res = await fetch('words.json');
    if (!res.ok) throw new Error("JSON Fetch Failed");
    WORLD_POOL = await res.json();
    document.getElementById('db-status').innerText = `${WORLD_POOL.length} words loaded`;
    document.getElementById('db-status').style.color = "var(--kenya-green)";
  } catch (e) {
    document.getElementById('db-status').innerText = "Offline Mode Active";
    for(let i=1; i<=5000; i++) WORLD_POOL.push({ w: `Word Card ${i}`, pts: i % 5 === 0 ? 20 : 10 });
  }
}

function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderTeams() {
  const c = document.getElementById('team-list');
  c.innerHTML = '';
  game.teams.forEach((t, i) => {
    c.innerHTML += `
      <div class="team-row">
        <input class="team-input" value="${t.n}" oninput="game.teams[${i}].n=this.value">
        ${game.teams.length > 2 ? `<button class="btn-del" onclick="delTeam(${i})">✕</button>` : ''}
      </div>`;
  });
}
function addTeam() { if(game.teams.length < 6) { game.teams.push({n:`Team ${game.teams.length+1}`, s:0}); renderTeams(); } }
function delTeam(i) { game.teams.splice(i,1); renderTeams(); }

function startGame() { nav('view-scores'); renderScores(); }

function renderScores() {
  document.getElementById('round-label').innerText = `Round ${game.round}`;
  const c = document.getElementById('score-container');
  c.innerHTML = '';
  [...game.teams].sort((a,b)=>b.s-a.s).forEach(t => {
    c.innerHTML += `<div class="score-card"><div class="score-name">${t.n}</div><div class="score-pts">${t.s}</div></div>`;
  });
}

function startTurn() {
  const team = game.teams[game.curr];
  document.getElementById('play-team').innerText = team.n;
  
  let pool = [...WORLD_POOL].sort(() => 0.5 - Math.random());
  game.words = pool.slice(0, 10).map(w => ({...w, checked: false}));
  
  const list = document.getElementById('word-list');
  list.innerHTML = '';
  game.words.forEach((w, i) => {
    list.innerHTML += `
      <div class="word-row" id="wr-${i}" onclick="toggle(${i})">
        <div class="radio-btn"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        <div class="word-text">${w.w}</div>
        <div class="word-pts">${w.pts || 10} pts</div>
      </div>`;
  });

  game.time = 50;
  document.getElementById('play-timer').innerText = game.time;
  document.getElementById('play-timer').style.color = "var(--kenya-red)";
  document.getElementById('live-pts').innerText = '0';
  nav('view-play');
  
  game.active = true;
  clearInterval(game.timer);
  game.timer = setInterval(() => {
    game.time--;
    const tBox = document.getElementById('play-timer');
    tBox.innerText = game.time;
    if(game.time <= 10) tBox.style.textShadow = "0 0 20px rgba(200,16,46,0.9)";
    if(game.time <= 0) endTurnEarly();
  }, 1000);
}

function toggle(i) {
  if(!game.active) return;
  game.words[i].checked = !game.words[i].checked;
  const row = document.getElementById(`wr-${i}`);
  game.words[i].checked ? row.classList.add('checked') : row.classList.remove('checked');
  
  let pts = game.words.filter(w=>w.checked).reduce((sum, w) => sum + (w.pts || 10), 0);
  document.getElementById('live-pts').innerText = pts;
}

function endTurnEarly() {
  game.active = false;
  clearInterval(game.timer);
  let pts = game.words.filter(w=>w.checked).reduce((sum, w) => sum + (w.pts || 10), 0);
  game.teams[game.curr].s += pts;
  document.getElementById('turn-score').innerText = pts;
  document.getElementById('modal-timeup').classList.add('show');
}

function closeTurn() {
  document.getElementById('modal-timeup').classList.remove('show');
  if(game.teams[game.curr].s >= 500) {
    document.getElementById('win-team').innerText = game.teams[game.curr].n;
    document.getElementById('modal-winner').classList.add('show');
    return;
  }
  game.curr++;
  if(game.curr >= game.teams.length) { game.curr = 0; game.round++; }
  renderScores();
  nav('view-scores');
}

loadWords();
renderTeams();
</script>
</body>
</html>
