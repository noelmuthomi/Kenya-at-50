<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kenya at 50</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #121212; --bg-card: rgba(255, 255, 255, 0.05);
    --text-main: #FDF6E3; --text-muted: #A0A0A0;
    --kenya-red: #C8102E; --kenya-green: #006600; --kenya-gold: #E6A817;
    --font-scale: 1;
  }
  [data-theme='light'] {
    --bg-main: #f0f0f0; --bg-card: rgba(0, 0, 0, 0.05);
    --text-main: #111; --text-muted: #555;
  }
  * { box-sizing: border-box; transition: background 0.3s, color 0.3s; font-size: calc(1rem * var(--font-scale)); }
  body { font-family: 'Ubuntu', sans-serif; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s; overflow-y: auto; }
  .screen.active { opacity: 1; pointer-events: all; z-index: 10; }

  .header { text-align: center; padding: 40px 20px 20px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: calc(4rem * var(--font-scale)); line-height: 1; }
  .container { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 15px; }

  .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; text-align: center; }
  .btn-primary { background: var(--kenya-red); color: white; }
  .btn-outline { background: var(--bg-card); border: 1px solid var(--text-muted); color: var(--text-main); }

  /* Settings Styles */
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-card); border-radius: 12px; }
</style>
</head>
<body>

<div class="screen active" id="view-setup">
  <div class="header">
    <div class="title">KENYA AT <span>50</span></div>
  </div>
  <div class="container">
    <div id="team-list" style="display:flex; flex-direction:column; gap:10px;"></div>
    <button class="btn btn-outline" onclick="addTeam()">+ Add Team</button>
    <button class="btn btn-primary" onclick="startGame()">Start Tournament</button>
    <button class="btn btn-outline" onclick="nav('view-settings')">⚙ Settings</button>
  </div>
</div>

<div class="screen" id="view-settings">
  <div class="header"><h2>Settings</h2></div>
  <div class="container">
    <div class="setting-row">
      <span>Theme</span>
      <button class="btn btn-outline" onclick="toggleTheme()">Toggle Light/Dark</button>
    </div>
    <div class="setting-row">
      <span>Font Size</span>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline" onclick="changeFont(-0.1)">A-</button>
        <button class="btn btn-outline" onclick="changeFont(0.1)">A+</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="nav('view-setup')">Back</button>
  </div>
</div>

<div class="screen" id="view-scores">
  <div class="header"><h2>Leaderboard</h2></div>
  <div class="container">
    <div id="score-container"></div>
    <button class="btn btn-primary" onclick="startTurn()">Start Next Turn</button>
    <button class="btn btn-outline" style="border-color:var(--kenya-red)" onclick="restartGame()">⟳ Restart Tournament</button>
  </div>
</div>

<div class="screen" id="view-play">
  <div class="header"><div id="play-team" style="font-size:2rem; font-weight:bold;"></div><div id="play-timer" style="font-size:4rem; color:var(--kenya-red);">50</div></div>
  <div class="container"><div id="word-list"></div><button class="btn btn-primary" onclick="endTurnEarly()">Stop Timer</button></div>
</div>

<script>
let game = { teams: [{n:"Team 1", s:0}], curr: 0, round: 1, active: false };

// --- Settings & UI Logic ---
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
}

function changeFont(delta) {
  let val = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-scale')) + delta;
  document.documentElement.style.setProperty('--font-scale', Math.max(0.8, Math.min(val, 1.5)));
}

// --- Game Logic ---
function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restartGame() {
  if(confirm("Are you sure you want to reset all scores?")) {
    game.teams.forEach(t => t.s = 0);
    game.curr = 0;
    game.round = 1;
    nav('view-setup');
  }
}

function startGame() { nav('view-scores'); renderScores(); }

function addTeam() { if(game.teams.length < 6) { game.teams.push({n:`Team ${game.teams.length+1}`, s:0}); renderTeams(); } }
function renderTeams() {
    const c = document.getElementById('team-list');
    c.innerHTML = game.teams.map((t,i) => `<input class="btn-outline" style="padding:10px" value="${t.n}" oninput="game.teams[${i}].n=this.value">`).join('');
}

function renderScores() {
  const c = document.getElementById('score-container');
  c.innerHTML = game.teams.map(t => `<div class="setting-row"><span>${t.n}</span><span>${t.s} pts</span></div>`).join('');
}

function startTurn() {
    nav('view-play');
    document.getElementById('play-team').innerText = game.teams[game.curr].n;
    // ... rest of timer logic ...
}

function endTurnEarly() {
    // Logic to add points
    nav('view-scores');
    renderScores();
}

// Initialize
renderTeams();
</script>
</body>
</html>
