<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kenya at 50 — Word Party Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E; --green: #006600; --black: #121212; --gold: #E6A817; 
    --bg-dark: #1a1a1a; --card-bg: #242424; --white: #FFFFFF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
  input { user-select: text; }
  
  body { font-family: 'Ubuntu', sans-serif; background: var(--bg-dark); color: var(--white); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s; overflow-y: auto; padding-bottom: 20px; }
  .screen.active { opacity: 1; pointer-events: all; z-index: 10; background: var(--bg-dark); }
  
  .header { text-align: center; padding: 30px 20px 15px; background: var(--black); border-bottom: 3px solid var(--red); }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 2px; line-height: 1; color: var(--white); }
  .title span { color: var(--gold); }
  .db-status { font-size: 0.8rem; color: #888; margin-top: 5px; }

  .content { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 15px; }
  
  .btn { padding: 16px 20px; border-radius: 12px; border: none; font-family: 'Ubuntu', sans-serif; font-weight: 700; font-size: 1.1rem; cursor: pointer; text-align: center; width: 100%; transition: transform 0.1s; }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: linear-gradient(135deg, var(--red), #8B0000); color: white; box-shadow: 0 4px 15px rgba(200,16,46,0.4); }
  .btn-success { background: linear-gradient(135deg, var(--green), #004d00); color: white; }
  .btn-outline { background: transparent; border: 2px solid #444; color: #ccc; }

  .team-row { display: flex; gap: 10px; }
  .team-input { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid #333; background: var(--card-bg); color: white; font-family: 'Ubuntu', sans-serif; font-weight: 700; font-size: 1rem; }
  .team-input:focus { border-color: var(--gold); outline: none; }
  .btn-del { background: #333; color: #ff4444; border: none; border-radius: 10px; width: 50px; font-size: 1.2rem; cursor: pointer; }

  .score-card { background: var(--card-bg); border-radius: 12px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--gold); margin-bottom: 10px; }
  .score-name { font-size: 1.2rem; font-weight: 700; }
  .score-pts { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--gold); line-height: 1; }

  .play-header { background: var(--black); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 20; }
  .timer-text { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--white); }
  
  .word-list { background: white; border-radius: 15px; overflow: hidden; margin-top: 10px; }
  .word-row { display: flex; align-items: center; gap: 15px; padding: 18px 20px; border-bottom: 1px solid #eee; cursor: pointer; background: white; }
  .word-row.checked { background: #f4fdf4; }
  .word-radio { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; }
  .word-row.checked .word-radio { background: var(--green); border-color: var(--green); }
  .word-radio svg { width: 14px; height: 14px; fill: none; stroke: white; stroke-width: 3; opacity: 0; }
  .word-row.checked .word-radio svg { opacity: 1; }
  .word-text { flex: 1; font-size: 1.1rem; font-weight: 700; color: #222; }
  .word-row.checked .word-text { color: #aaa; text-decoration: line-through; }
  .word-pts { font-size: 0.85rem; font-weight: 700; color: var(--red); border: 1.5px solid var(--red); padding: 3px 10px; border-radius: 20px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 50; transition: opacity 0.3s; padding: 20px; text-align: center; }
  .overlay.active { opacity: 1; pointer-events: all; }
  .over-title { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; color: var(--gold); }
  .over-pts { font-size: 1.5rem; color: white; margin-bottom: 25px; }
</style>
</head>
<body>

<div class="screen active" id="scr-setup">
  <div class="header">
    <div class="title">KENYA AT <span>50</span></div>
    <div class="db-status" id="db-status">Loading Database...</div>
  </div>
  <div class="content">
    <div id="team-list"></div>
    <button class="btn btn-outline" onclick="addTeam()">➕ Add Team</button>
    <button class="btn btn-success" style="margin-top: 15px;" onclick="startGame()">Let's Play</button>
  </div>
</div>

<div class="screen" id="scr-scores">
  <div class="header">
    <div class="title">SCOREBOARD</div>
    <div class="db-status" id="round-label">Round 1</div>
  </div>
  <div class="content">
    <div id="score-container"></div>
    <button class="btn btn-primary" onclick="startTurn()">Start Next Turn</button>
  </div>
</div>

<div class="screen" id="scr-play">
  <div class="play-header">
    <div>
      <div style="color: var(--gold); font-weight: 700; font-size: 1.2rem;" id="play-team">Team Name</div>
      <div style="font-size: 0.8rem; color: #888;">Live Pts: <span id="live-pts" style="color: white; font-weight: bold;">0</span></div>
    </div>
    <div class="timer-text" id="play-timer">50</div>
  </div>
  <div class="content" style="padding-top: 10px;">
    <div class="word-list" id="word-list"></div>
    <button class="btn btn-primary" style="margin-top: 15px; background: #333;" onclick="endTurnEarly()">Stop Timer</button>
  </div>
</div>

<div class="overlay" id="over-timeup">
  <div class="over-title" style="color: var(--red);">TIME'S UP!</div>
  <div class="over-pts">Turn Score: <strong id="turn-score" style="color: var(--gold);">0</strong> pts</div>
  <button class="btn btn-primary" style="max-width: 300px;" onclick="closeTurn()">Continue</button>
</div>

<div class="overlay" id="over-winner">
  <div class="over-title">CHAMPIONS!</div>
  <div class="over-pts" id="win-team" style="font-size: 2.5rem; font-weight: bold; text-transform: uppercase;">Team Name</div>
  <button class="btn btn-success" style="max-width: 300px;" onclick="location.reload()">Play Again</button>
</div>

<script>
let WORLD_POOL = [
  // Fallback data in case the JSON fails to load
  { "w": "Matatu", "pts": 10 }, { "w": "Nyama Choma", "pts": 10 }, { "w": "Viusasa", "pts": 10 },
  { "w": "Safaricom", "pts": 10 }, { "w": "Ugali", "pts": 10 }, { "w": "Kachumbari", "pts": 20 }
];

let game = { teams: [{n:"Team Moja", s:0}, {n:"Team Mbili", s:0}], curr: 0, round: 1, words: [], timer: null, time: 50, active: false };

// Load the JSON File Asynchronously
async function loadWords() {
  try {
    const res = await fetch('words.json');
    if (!res.ok) throw new Error("File not found");
    WORLD_POOL = await res.json();
    document.getElementById('db-status').innerText = `${WORLD_POOL.length} words loaded successfully.`;
    document.getElementById('db-status').style.color = "var(--green)";
  } catch (e) {
    document.getElementById('db-status').innerText = `Using offline fallback database.`;
  }
}

function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderTeams() {
  const c = document.getElementById('team-list');
  c.innerHTML = '';
  game.teams.forEach((t, i) => {
    c.innerHTML += `
      <div class="team-row" style="margin-bottom: 10px;">
        <input class="team-input" value="${t.n}" oninput="game.teams[${i}].n=this.value">
        ${game.teams.length > 2 ? `<button class="btn-del" onclick="delTeam(${i})">✕</button>` : ''}
      </div>`;
  });
}
function addTeam() { if(game.teams.length < 6) { game.teams.push({n:`Team ${game.teams.length+1}`, s:0}); renderTeams(); } }
function delTeam(i) { game.teams.splice(i,1); renderTeams(); }

function startGame() { nav('scr-scores'); renderScores(); }

function renderScores() {
  document.getElementById('round-label').innerText = `Round ${game.round}`;
  const c = document.getElementById('score-container');
  c.innerHTML = '';
  [...game.teams].sort((a,b)=>b.s-a.s).forEach(t => {
    c.innerHTML += `<div class="score-card"><div class="score-name">${t.n}</div><div class="score-pts">${t.s}</div></div>`;
  });
}

function startTurn() {
  const team = game.teams[game.curr];
  document.getElementById('play-team').innerText = team.n;
  
  // Shuffle and pick 10 words
  let pool = [...WORLD_POOL].sort(() => 0.5 - Math.random());
  game.words = pool.slice(0, 10).map(w => ({...w, checked: false}));
  
  const list = document.getElementById('word-list');
  list.innerHTML = '';
  game.words.forEach((w, i) => {
    list.innerHTML += `
      <div class="word-row" id="wr-${i}" onclick="toggle(${i})">
        <div class="word-radio"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        <div class="word-text">${w.w}</div>
        <div class="word-pts">${w.pts || 10} pts</div>
      </div>`;
  });

  game.time = 50;
  document.getElementById('play-timer').innerText = game.time;
  document.getElementById('live-pts').innerText = '0';
  nav('scr-play');
  
  game.active = true;
  clearInterval(game.timer);
  game.timer = setInterval(() => {
    game.time--;
    document.getElementById('play-timer').innerText = game.time;
    if(game.time <= 0) endTurnEarly();
  }, 1000);
}

function toggle(i) {
  if(!game.active) return;
  game.words[i].checked = !game.words[i].checked;
  const row = document.getElementById(`wr-${i}`);
  game.words[i].checked ? row.classList.add('checked') : row.classList.remove('checked');
  
  let pts = game.words.filter(w=>w.checked).reduce((sum, w) => sum + (w.pts || 10), 0);
  document.getElementById('live-pts').innerText = pts;
}

function endTurnEarly() {
  game.active = false;
  clearInterval(game.timer);
  let pts = game.words.filter(w=>w.checked).reduce((sum, w) => sum + (w.pts || 10), 0);
  game.teams[game.curr].s += pts;
  document.getElementById('turn-score').innerText = pts;
  document.getElementById('over-timeup').classList.add('active');
}

function closeTurn() {
  document.getElementById('over-timeup').classList.remove('active');
  if(game.teams[game.curr].s >= 500) {
    document.getElementById('win-team').innerText = game.teams[game.curr].n;
    document.getElementById('over-winner').classList.add('active');
    return;
  }
  game.curr++;
  if(game.curr >= game.teams.length) { game.curr = 0; game.round++; }
  renderScores();
  nav('scr-scores');
}

loadWords();
renderTeams();
</script>
</body>
</html>
