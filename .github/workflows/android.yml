name: Production Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Forces GitHub Actions to bypass the deprecated Node 20 environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compile and Package Application
        run: |
          # 1. Prepare web root directory
          mkdir -p www
          cp index.html www/index.html
          [ -f "words.json" ] && cp words.json www/words.json
          
          # 2. Setup project infrastructure
          cat << 'EOF' > package.json
          {
            "name": "kenya-at-50",
            "version": "1.0.0",
            "devDependencies": {
              "@capacitor/cli": "^6.0.0",
              "@capacitor/assets": "^3.0.0"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            }
          }
          EOF
          
          # 3. Install core dependencies
          npm install
          
          # 4. Generate App Icons (Auto-generated from assets/icon.png)
          if [ -f "assets/icon.png" ]; then
            echo "Generating adaptive icons..."
            npx capacitor-assets generate --android
          else
            echo "Warning: assets/icon.png not found. Using default."
          fi
          
          # 5. Initialize Capacitor Config
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "org.kenya50.game",
            "appName": "Kenya At 50",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "cleartext": true
            }
          }
          EOF
          
          # 6. Inject native Android framework and sync assets
          npx cap add android
          npx cap sync android
          
          # 7. Final Build
          cd android
          ./gradlew assembleDebug
      - name: Provide Downloadable APK
        uses: actions/upload-artifact@v4
        with:
          name: KenyaAt50-Game-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
