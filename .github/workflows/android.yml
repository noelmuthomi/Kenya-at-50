name: Production Android Build (Fully Offline)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Prepare offline web assets
        run: |
          mkdir -p www
          cp index.html www/index.html
          if [ -f "words.json" ]; then
            cp words.json www/words.json
          else
            echo "Error: words.json is required for offline game." >&2
            exit 1
          fi
          # Ensure app works fully offline; no extra network requests
          echo "Offline bundle contains: index.html and words.json"

      - name: Create package.json
        run: |
          cat > package.json <<'EOF'
          {
            "name": "kenya-at-50",
            "version": "1.0.0",
            "scripts": {
              "build": "echo 'Using pre‑prepared www assets'"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0",
              "@capacitor/assets": "^3.0.0"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            }
          }
          EOF

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "org.kenya50.game",
            "appName": "Kenya At 50",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "cleartext": true
            }
          }
          EOF

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Android icons from assets/icon.png
        run: |
          if [ -f "assets/icon.png" ]; then
            echo "Generating Android icons from assets/icon.png"
            npx capacitor-assets generate --android
          else
            echo "Error: assets/icon.png is required for the app icon." >&2
            exit 1
          fi

      - name: Create and sync Capacitor Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Android debug APK (fully offline)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KenyaAt50-Game-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
