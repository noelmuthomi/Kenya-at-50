name: Compile FOSS Android Target

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Android App Pack
        run: |
          # 1. Prepare web asset folder context
          mkdir www
          cp index.html www/index.html
          
          # 2. Setup project package parameters cleanly
          cat << 'EOF' > package.json
          {
            "name": "kenya-at-50",
            "version": "1.0.0",
            "description": "FOSS Word Game",
            "main": "index.html",
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/core": "^5.0.0"
            }
          }
          EOF
          
          # 3. Securely install matching Capacitor dependencies
          npm install
          
          # 4. Initialize Capacitor Config System
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "org.kenya50.game",
            "appName": "Kenya At 50",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          
          # 5. Inject native android module and bundle wrapper framework
          npx cap add android
          npx cap sync android
          
          # 6. Execute direct gradle target compilation
          cd android
          ./gradlew assembleDebug

      - name: Upload Native APK File
        uses: actions/upload-artifact@v4
        with:
          name: Kenya50-Game-Target
          path: android/app/build/outputs/apk/debug/app-debug.apk
