name: Generate Production FOSS Android App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Android App Pack
        run: |
          # 1. Prepare web asset folder and copy your code and database
          mkdir www
          cp index.html www/index.html
          cp words.json www/words.json
          
          # 2. Setup project package parameters including the asset generation tools
          cat << 'EOF' > package.json
          {
            "name": "kenya-at-50",
            "version": "1.0.0",
            "description": "FOSS Word Game",
            "main": "index.html",
            "scripts": {
              "build": "echo 'No build step required for raw HTML'"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0",
              "@capacitor/assets": "^3.0.0"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            }
          }
          EOF
          
          # 3. Install dependencies
          npm install
          
          # 4. Initialize Capacitor Config System
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "org.kenya50.game",
            "appName": "Kenya At 50",
            "webDir": "www",
            "bundledWebRuntime": false,
            "plugins": {
              "CapacitorHttp": {
                "enabled": true
              }
            },
            "server": {
              "androidScheme": "https"
            }
          }
          EOF
          
          # 5. Inject native android module
          npx cap add android

          # 6. ICON GENERATION STEP
          # If the icon exists, use Capacitor Assets to auto-generate all Android icon sizes
          if [ -f "icon-only.png" ]; then
            npx capacitor-assets generate --android --iconSecureTemplate icon-only.png
          else
            echo "Warning: icon-only.png not found. Using default Android icon."
          fi
          
          # 7. Sync files and execute direct gradle target compilation
          npx cap sync android
          cd android
          ./gradlew assembleDebug

      - name: Export Executable App
        uses: actions/upload-artifact@v4
        with:
          name: Kenya50-WordGame-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
