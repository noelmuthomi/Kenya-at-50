name: Generate Production FOSS Android App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Build Native App Package
        run: |
          # 1. Install an ultra-reliable HTML-to-Android engine wrapper
          sudo apt-get update && sudo apt-get install -y wget zip unzip
          
          # 2. Setup the application directory
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          
          # 3. Move your game files into the Android asset ecosystem
          cp index.html app/src/main/assets/index.html
          cp words.json app/src/main/assets/words.json
          
          # 4. Generate the required native Android Manifest configuration
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="org.kenya50.game">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Kenya At 50" android:theme="@android:style/Theme.NoTitleBar.Fullscreen" android:allowBackup="true" android:icon="@android:drawable/sym_def_app_icon">
                  <activity android:name="org.kenya50.game.MainActivity" android:exported="true" android:screenOrientation="portrait" android:configChanges="orientation|keyboardHidden|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Build the underlying Java Activity to launch your offline code safely
          mkdir -p app/src/main/java/org/kenya50/game
          cat << 'EOF' > app/src/main/java/org/kenya50/game/MainActivity.java
          package org.kenya50.game;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setDatabaseEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setLoadWithOverviewMode(true);
                  webSettings.setUseWideViewPort(true);
                  
                  // This allows the local index.html to fetch the local words.json safely
                  webSettings.setAllowFileAccessFromFileURLs(true);
                  webSettings.setAllowUniversalAccessFromFileURLs(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          # 6. Generate standard gradle structure files
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google() \n mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.2' }
          }
          allprojects {
              repositories { google() \n mavenCentral() }
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'org.kenya50.game'
              compileSdk 34
              defaultConfig {
                  applicationId "org.kenya50.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          EOF

          cat << 'EOF' > settings.gradle
          include ':app'
          EOF

          # 7. Package everything up cleanly using Gradle
          chmod +x /usr/share/gradle/bin/gradle || true
          gradle wrapper --gradle-version 8.0
          ./gradlew assembleDebug

      - name: Export Executable App
        uses: actions/upload-artifact@v4
        with:
          name: Kenya50-WordGame-APK
          path: app/build/outputs/apk/debug/app-debug.apk
